<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bird Page!</title>
   
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #ffffff;
            color: #000000;
        }
        header {
            padding: 40px 20px;
            border-bottom: 1px solid #ccc;
        }
        main {
            padding: 40px 20px;
        }
        section {
            margin-bottom: 40px;
        }
        footer {
            padding: 20px;
            border-top: 1px solid #ccc;
            font-size: 12px;
        }
        button {
            padding: 10px 20px;
            border: 1px solid #000;
            background: none;
            cursor: pointer;
        }
        #counter{
            color: #FF5500;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome</h1>
</header>

<main>
    <section>
        <h2>Status</h2>
        <span id="counter">0</span> birds have been discovered today
    </section>

    <section>
        <h2>Features</h2>
        <p>There are no notable features.</p>
    </section>

    <section>
        <h2>Contact</h2>
        <p>You cannot contact anyone here.</p>
        <button>Click Me</button>
    </section>
</main>

<footer>
    <p>© 2026 Boring Company</p>
</footer>

</body>
<script>
    let count = 5;
    document.getElementById("counter").innerHTML = count;
</script>
</html>
